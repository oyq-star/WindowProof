# WindowProof Default Configuration

# Data settings
data:
  window_size_sec: 300        # 5-minute time windows
  min_points_per_window: 5    # minimum GPS points per window
  min_trajectory_length: 10   # minimum trajectory length (points)

# Secure capture module
capture:
  sketch_features:
    - sample_count
    - duration_sec
    - total_path_length_m
    - max_speed_mps
    - mean_speed_mps
    - stop_ratio
    - turn_count
    - heading_entropy
  geohash_precision: 6        # for geohash bitmap in sketch

# Checkpoint extraction
checkpoint:
  min_stop_duration_sec: 60   # minimum stop duration
  stop_speed_threshold_mps: 1.0
  sharp_turn_threshold_deg: 45
  min_checkpoint_density: 0.1 # minimum checkpoints / total points ratio

# Blockchain simulation
blockchain:
  commitment_deadline_sec: 600  # 10 minutes
  max_window_gap: 1             # max allowed gap in window IDs
  hash_algorithm: sha256
  block_size: 10                # transactions per block

# Detection
detection:
  isolation_forest:
    n_estimators: 100
    contamination: 0.05
    random_state: 42
  lof:
    n_neighbors: 20
    contamination: 0.05
  sketch_distance_metric: cosine  # for Δ_t computation
  audit_threshold: 0.7            # sketch residual threshold for audit trigger
  behavior_threshold: 0.5         # IF score threshold

# Attack simulation
attacks:
  behavioral:
    detour_ratio: 0.1
    loop_probability: 0.05
    abnormal_stop_duration_range: [300, 1800]
    speed_burst_factor: 3.0
    teleport_distance_m: 5000
  integrity:
    point_deletion_ratio: 0.3
    injection_count: 10
    timestamp_shift_sec: 120
    replay_segment_length: 20
    window_drop_probability: 0.1

# Experiment
experiment:
  random_seed: 42
  test_ratio: 0.3
  n_runs: 5
  anomaly_ratio: 0.2
